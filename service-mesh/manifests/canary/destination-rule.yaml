# DestinationRule — defines the v1/v2 subsets the VirtualService routes to.
#
# A DestinationRule is the policy attached to the destination side of a
# connection. It declares:
#   - Subsets: how to carve up the pods backing a Service into routable
#     groups, keyed by pod labels.
#   - Connection pooling, outlier detection, TLS settings (not used here).
#
# Without this DR, the VirtualService's `subset: v1` reference would be
# unresolved and the waypoint would fall back to round-robin across ALL
# sample-app pods.

apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: sample-app
  namespace: sample-app
spec:
  host: sample-app.sample-app.svc.cluster.local
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
