# AuthorizationPolicy — zero-trust authorization between mesh pods.
#
# Pedagogical scope (kept narrow on purpose):
#   - sample-app: no AuthZ policies. With PeerAuthentication PERMISSIVE
#     and no AuthZ rules, anyone can reach sample-app pods. This keeps
#     the canary demo (waypoint → backend) and Prometheus scrapes both
#     working without juggling waypoint-passthrough rules.
#   - inventory-api: this is where the AuthZ teaching happens.
#     - default-deny (no fields) — no traffic allowed unless explicitly
#       permitted.
#     - allow-sample-app-to-inventory — sample-app's SA (SPIFFE principal)
#       is the only mesh identity allowed to talk to inventory-api on
#       port 8080. The curl-client in mesh-test (different SA) gets
#       denied — that's the demo.
#     - allow-prometheus-scrape — non-mesh observability tooling
#       (kube-prometheus-stack in `monitoring`, ama-metrics in
#       `kube-system`) is allowed to reach port 8080 for /metrics
#       scraping. Source identified by namespace (no SPIFFE because
#       those pods aren't in the mesh).
#
# In Ambient mode, ztunnel enforces L4 AuthorizationPolicy only (source
# identity + destination port). L7 (path, method, host) needs a Waypoint.
# We keep AuthZ L4 here.

# ===== inventory-api namespace =====

apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: default-deny
  namespace: inventory-api
spec: {}

---
# THE zero-trust teaching policy. SPIFFE-based: only the sample-app
# ServiceAccount can reach inventory-api on port 8080. The mesh-test
# curl-client (cluster.local/ns/mesh-test/sa/curl-client) is NOT in
# this list and gets rejected by ztunnel.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-sample-app-to-inventory
  namespace: inventory-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-api
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/sample-app/sa/sample-app
      to:
        - operation:
            ports: ["8080"]

---
# Allow Prometheus + ama-metrics to scrape inventory-api's port 8080.
# Source matching by namespace works for non-mesh sources because Istio
# can look up source pod IP → namespace via the K8s API.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: inventory-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-api
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - monitoring
              - kube-system
      to:
        - operation:
            ports: ["8080"]
