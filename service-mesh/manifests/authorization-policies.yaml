# AuthorizationPolicy — zero-trust authorization between mesh pods.
#
# In Ambient mode, ztunnel enforces L4 AuthorizationPolicy (deny/allow by
# source identity + destination port). L7 AuthZ (path, method, host) needs
# a Waypoint proxy. For this lab we keep all AuthZ rules L4 so the same
# policy works whether a namespace has a waypoint or not.
#
# Pattern: "default deny + explicit allows". For each app namespace:
#   1. default-deny  — no rules, no matches → reject (when combined with at
#      least one ALLOW policy in the namespace, this is Istio's
#      conventional way to express deny-all).
#   2. allow-non-mesh-scrape — for Prometheus (monitoring ns) and
#      ama-metrics (kube-system ns) to reach /metrics. Source is identified
#      by namespace (no SPIFFE — those pods aren't in the mesh).
#   3. The cross-app allow — sample-app's SA can talk to inventory-api,
#      identified by SPIFFE principal.
#
# Note: kubectl port-forward goes via the kubelet (host network), which
# Istio Ambient treats specially — those connections are NOT intercepted by
# ztunnel, so no AuthZ rule is needed for port-forward to work.

# ===== sample-app namespace =====

---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: default-deny
  namespace: sample-app
spec: {}

---
# Allow the curl-client in mesh-test to hit sample-app (drives the canary
# demo). Principal-based — the curl-client pod has a SPIFFE identity.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-mesh-test
  namespace: sample-app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/mesh-test/sa/curl-client

---
# Allow Prometheus (in-cluster, monitoring ns) AND ama-metrics (Azure
# Managed Prometheus agent, kube-system ns) to scrape sample-app's port
# 3000 endpoint. These pods are NOT in the mesh — Istio matches them by
# namespace via the source IP → pod → namespace lookup.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: sample-app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - monitoring
              - kube-system
      to:
        - operation:
            ports: ["3000"]

# ===== inventory-api namespace =====

---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: default-deny
  namespace: inventory-api
spec: {}

---
# The cross-app allow: sample-app's ServiceAccount can talk to inventory-
# api. Identity comes from SPIFFE: the source principal is
# cluster.local/ns/sample-app/sa/sample-app. ztunnel verifies the mTLS
# cert and matches its SPIFFE SAN against this policy.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-sample-app-to-inventory
  namespace: inventory-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-api
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/sample-app/sa/sample-app
      to:
        - operation:
            ports: ["8080"]

---
# Allow Prometheus + ama-metrics to scrape inventory-api's port 8080.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: inventory-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-api
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - monitoring
              - kube-system
      to:
        - operation:
            ports: ["8080"]
