# Kyverno admission controller + 4 ClusterPolicies in Audit mode.
#
# Multi-source Application. Same shape as observability:
#   1. The upstream Helm chart (kyverno/kyverno)
#   2. This repo as $values (our chart overrides)
#   3. This repo as a path (the kustomize bundle of ClusterPolicies)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://kyverno.github.io/kyverno
      chart: kyverno
      targetRevision: 3.8.1
      helm:
        valueFiles:
          - $values/security/kyverno/values.yaml
        releaseName: kyverno

    - repoURL: https://github.com/iscoct/globalretail-platform
      targetRevision: main
      ref: values

    - repoURL: https://github.com/iscoct/globalretail-platform
      targetRevision: main
      path: security/kyverno/policies

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
