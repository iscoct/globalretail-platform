# The CSI Secrets Store Driver (the K8s side — the DaemonSet that mounts
# volumes from external secret stores). Provider-agnostic.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-store-csi-driver
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
      chart: secrets-store-csi-driver
      targetRevision: 1.6.0
      helm:
        valueFiles:
          - $values/security/secrets-store-csi/values-driver.yaml
        releaseName: secrets-store-csi-driver

    - repoURL: https://github.com/iscoct/globalretail-platform
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-secrets-store-csi-driver

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
