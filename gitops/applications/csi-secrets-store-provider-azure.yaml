# The Azure Key Vault provider for the CSI Secrets Store Driver.
# Without this provider, the driver knows how to mount but not how to talk
# to Key Vault. With it (and Workload Identity), the SecretProviderClass
# can reference an Azure Key Vault by name and the driver fetches secrets
# using the pod's federated identity.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csi-secrets-store-provider-azure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://azure.github.io/secrets-store-csi-driver-provider-azure/charts
      chart: csi-secrets-store-provider-azure
      targetRevision: 1.8.1
      helm:
        valueFiles:
          - $values/security/secrets-store-csi/values-azure.yaml
        releaseName: csi-secrets-store-provider-azure

    - repoURL: https://github.com/iscoct/globalretail-platform
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-secrets-store-csi-driver

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
