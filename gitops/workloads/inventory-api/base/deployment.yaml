apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  labels:
    app.kubernetes.io/name: inventory-api
    app.kubernetes.io/part-of: globalretail
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-api
        app.kubernetes.io/part-of: globalretail
    spec:
      # Pod-level securityContext from day-one (the §5.3 lesson learned
      # from sample-app). No Workload Identity needed — inventory-api has
      # no Azure-resource dependencies in v1.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: app
          image: globalretail/inventory-api:placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 96Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
