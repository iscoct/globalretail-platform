apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: globalretail
    # `version` is the subset key the DestinationRule (Layer 6) uses to
    # carve sample-app into v1/v2 for canary routing. Without this label
    # on the pods, the VirtualService 90/10 split has nothing to match.
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
      version: v1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-app
        app.kubernetes.io/part-of: globalretail
        version: v1
        # This label is what the Workload Identity webhook looks for. With
        # it, AND a SA whose annotation points to a UAMI client_id, AND
        # AKS having `workload_identity_enabled = true` (Layer 1), the
        # webhook injects AZURE_CLIENT_ID / AZURE_TENANT_ID env vars and
        # a projected SA token at AZURE_FEDERATED_TOKEN_FILE.
        azure.workload.identity/use: 'true'
    spec:
      # Pod-level securityContext so Kyverno's require-runasnonroot policy
      # (Layer 5) is happy. The policy's anyPattern checks pod-level OR
      # every-container — the container-level setting is below, but
      # declaring it ALSO at the pod level eliminates the PolicyReport
      # noise. The history of WHY we did this is preserved in
      # security/README.md §6.3 (the original observation about Audit
      # mode catching real violations).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      # AKS kubelet UAMI has AcrPull on the ACR (Layer 1), so no imagePullSecret.
      serviceAccountName: sample-app
      containers:
        - name: app
          # Image name in the base is the logical name; the overlay rewrites
          # this to the actual ACR-prefixed image.
          image: globalretail/sample-app:placeholder
          # Always pull on container restart — the lab uses the mutable
          # `:main` tag, so the cluster needs to re-resolve the digest each
          # time a pod is replaced. Production with immutable SHA tags would
          # use IfNotPresent (Trivy already verified the tag in CI).
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            # APP_VERSION and APP_COMMIT are read by the /version endpoint.
            # The overlay can patch these per-env (e.g., to the deployed SHA).
            # Layer 6 sets this explicitly to "1.0.0" so the canary demo
            # output reads "1.0.0" vs "2.0.0" rather than "dev" vs "2.0.0".
            - name: APP_VERSION
              value: "1.0.0"
            # WELCOME_MESSAGE_FILE points at the path where the CSI driver
            # mounts the Key Vault secret. The app reads from this file
            # at request time so secret rotations (when enabled) are
            # visible without a pod restart.
            - name: WELCOME_MESSAGE_FILE
              value: /mnt/secrets/welcome-message
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Distroless's nonroot user is 65532:65532, but the image's USER
          # directive uses the STRING 'nonroot' rather than the numeric uid.
          # Kubernetes' `runAsNonRoot: true` check requires the uid to be
          # numerically verifiable BEFORE the container starts — a string
          # username is not enough. Without an explicit `runAsUser: 65532`
          # the pod fails to create with:
          #   "container has runAsNonRoot and image has non-numeric user
          #   (nonroot), cannot verify user is non-root"
          # See pitfall §6.2 in gitops/README.md.
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              # References the SecretProviderClass in the SAME namespace.
              # The driver looks at the SPC to know WHICH secrets to fetch
              # and WHERE from (Azure Key Vault, via the workload UAMI).
              secretProviderClass: sample-app-secrets
