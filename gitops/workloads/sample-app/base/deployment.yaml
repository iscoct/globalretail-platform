apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: globalretail
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-app
        app.kubernetes.io/part-of: globalretail
    spec:
      # AKS kubelet UAMI has AcrPull on the ACR (Layer 1), so no imagePullSecret.
      containers:
        - name: app
          # Image name in the base is the logical name; the overlay rewrites
          # this to the actual ACR-prefixed image.
          image: globalretail/sample-app:placeholder
          # Always pull on container restart — the lab uses the mutable
          # `:main` tag, so the cluster needs to re-resolve the digest each
          # time a pod is replaced. Production with immutable SHA tags would
          # use IfNotPresent (Trivy already verified the tag in CI).
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            # APP_VERSION and APP_COMMIT are read by the /version endpoint.
            # The overlay can patch these per-env (e.g., to the deployed SHA).
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Distroless runs as nonroot by default. We make the security
          # context explicit so it survives a base image swap.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
