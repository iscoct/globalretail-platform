# ServiceAccount that sample-app pods run as.
#
# Two important pieces of metadata:
#
#   1. The `azure.workload.identity/client-id` ANNOTATION carries the client
#      ID of the workload UAMI created by security/terraform/. The
#      Workload Identity webhook reads this when injecting the projected
#      token into pods using this SA.
#
#   2. The `azure.workload.identity/use: "true"` label goes on the POD
#      (deployment.yaml), not here — the webhook needs to see it at the
#      pod-template level to know whether to inject.
#
# After running `terraform apply` in security/terraform/, paste the
# `workload_identity_client_id` output into the annotation value below.
#
# This is the only place in the GitOps tree that has an environment-specific
# value committed. Per-env overlays in a multi-env setup would rewrite this
# via a kustomize ConfigMap generator or a `replacements:` transformer.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-app
  namespace: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: globalretail
  annotations:
    # Output of: terraform -chdir=security/terraform output -raw workload_identity_client_id
    azure.workload.identity/client-id: '62cc370a-e14b-4f32-8b20-e22d9acd2944'
