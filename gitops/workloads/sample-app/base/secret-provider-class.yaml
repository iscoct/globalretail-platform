# SecretProviderClass — tells the CSI Secrets Store Driver WHICH secrets to
# mount and WHERE they come from.
#
# The driver, via the Azure provider DaemonSet, authenticates to Key Vault
# using the workload UAMI (Workload Identity exchanges the projected SA
# token for an Entra ID token; that token gives access scoped by the
# UAMI's Azure RBAC role assignments — set by security/terraform/).

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sample-app-secrets
  namespace: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: globalretail
spec:
  provider: azure
  parameters:
    # The driver authenticates using the pod's Workload Identity (the SA
    # carrying the client-id annotation). No client_secret, no managed
    # identity binding on the node, no service-principal — pure OIDC.
    usePodIdentity: 'false'
    useVMManagedIdentity: 'false'
    # The tenant where the Key Vault and the workload UAMI live.
    # Same value as the platform tenant from Layer 1.
    tenantId: '84f58ce9-43c8-4932-b908-591a8a3007d3'
    # The Key Vault from Layer 1 (output: key_vault_name from security/terraform/).
    keyvaultName: 'kv-globalretail-38cc'
    # Each entry under `objects` is one secret/key/cert. The driver
    # mounts the resolved value as a file named `objectAlias` (defaults
    # to `objectName` if absent) inside the volume.
    objects: |
      array:
        - |
          objectName: sample-app-welcome-message
          objectType: secret
          objectAlias: welcome-message
