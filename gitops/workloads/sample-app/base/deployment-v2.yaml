# sample-app v2 — the canary target for Layer 6's traffic-split demo.
#
# Same image as v1; the only differences are:
#   - `version: v2` label on the pod template (DestinationRule's subset key)
#   - APP_VERSION=2.0.0 env var, so /version reports the new release
#   - replicas: 1 (we don't need redundancy on the canary tail)
#
# By reusing the v1 image with a single env-var override, we avoid building
# a separate Docker image for the demo. In production, a true canary would
# be a freshly-built image (different SHA tag).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app-v2
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: globalretail
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
      version: v2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-app
        app.kubernetes.io/part-of: globalretail
        version: v2
        azure.workload.identity/use: 'true'
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      serviceAccountName: sample-app
      containers:
        - name: app
          image: globalretail/sample-app:placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            # The version-override that makes /version return 2.0.0 on this
            # subset. The app code reads `process.env.APP_VERSION` at
            # request time.
            - name: APP_VERSION
              value: "2.0.0"
            - name: WELCOME_MESSAGE_FILE
              value: /mnt/secrets/welcome-message
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: sample-app-secrets
