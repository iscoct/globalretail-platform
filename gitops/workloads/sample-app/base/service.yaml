apiVersion: v1
kind: Service
metadata:
  name: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: globalretail
    # Layer 6 — `istio.io/use-waypoint` tells Istio Ambient that traffic
    # destined for this Service must be routed through the named waypoint
    # proxy (defined in service-mesh/manifests/canary/waypoint.yaml). The
    # waypoint is what evaluates VirtualService + DestinationRule for L7
    # routing — ztunnel alone does only L4. Without this label, the 90/10
    # canary split is silently ignored.
    istio.io/use-waypoint: sample-app-waypoint
spec:
  type: ClusterIP
  # Note: the selector deliberately does NOT include `version: v1` — the
  # Service must back BOTH v1 and v2 pods so that the waypoint can split
  # traffic between them via the DestinationRule subsets.
  selector:
    app.kubernetes.io/name: sample-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
