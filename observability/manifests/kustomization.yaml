# Kustomization for the custom observability resources.
#
# The kube-prometheus-stack Helm chart is deployed separately (multi-source
# Application). This kustomize bundle adds OUR resources on top of it:
#
#   - ServiceMonitor for sample-app → tells Prometheus to scrape /metrics
#   - PrometheusRule for sample-app → SLO recording + alerting rules
#   - ConfigMap with the Grafana dashboard → Grafana sidecar auto-loads it
#
# All three live in the `sample-app` namespace (next to the workload) — the
# prometheus-operator picks them up wherever they are because of
# serviceMonitorSelectorNilUsesHelmValues=false (and equivalents) in the
# stack values.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - sample-app/servicemonitor.yaml
  - alerts/sample-app-slos.yaml
  - dashboards/sample-app-dashboard.yaml
