# Tells the Prometheus Operator to scrape any Istio Waypoint proxy.
#
# Waypoint proxies are Envoy pods deployed per-namespace (or per-SA) and
# enrol via the `Gateway` CRD with class `istio-waypoint`. Each waypoint
# emits Envoy's stats AND Istio's L7 metrics (istio_requests_total with
# request_protocol, response_code, etc.) at /stats/prometheus on port
# 15020.
#
# The label selector matches any pod that's a managed waypoint — Istio
# automatically adds `gateway.istio.io/managed=istio.io-mesh-controller`
# to every waypoint pod it deploys. As more namespaces opt into waypoints
# (production scale-out), they all get scraped by this single PodMonitor.

apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-waypoint
  namespace: istio-system
  labels:
    app.kubernetes.io/name: istio-waypoint
    app.kubernetes.io/part-of: globalretail
spec:
  selector:
    matchLabels:
      gateway.istio.io/managed: istio.io-mesh-controller
  # Empty namespaceSelector = "any namespace" — waypoints live in app
  # namespaces (sample-app today; potentially more tomorrow).
  namespaceSelector:
    any: true
  podMetricsEndpoints:
    - port: metrics
      path: /stats/prometheus
      interval: 30s
      scrapeTimeout: 10s
